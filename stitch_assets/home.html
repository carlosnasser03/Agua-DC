<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agua DC - Home</title>
    <style>
        :root {
            --deep-blue: #003366;
            --sky-blue: #E0F2F1;
            --smoke-white: #F5F5F5;
            --bluish-gray: #546E7A;
            --soft-amber: #FFB300;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--smoke-white);
            color: var(--deep-blue);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .location-info p {
            color: var(--bluish-gray);
            font-size: 0.9rem;
        }

        .period-badge {
            background-color: var(--sky-blue);
            color: var(--deep-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .main-card {
            background: linear-gradient(135deg, #004d99 0%, #003366 100%);
            color: var(--white);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.1);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .main-card.no-water {
            background: var(--white);
            color: var(--deep-blue);
            border: 1px solid #E0E0E0;
        }

        .status-pill {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .schedule {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .warning-tag {
            color: var(--soft-amber);
            font-size: 0.75rem;
            margin-top: 15px;
            background: rgba(255, 179, 0, 0.1);
            padding: 6px;
            border-radius: 8px;
        }

        .next-block {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-info h3 {
            font-size: 0.85rem;
            color: var(--bluish-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-info p {
            font-weight: 600;
        }

        .next-countdown {
            background: var(--sky-blue);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-calendar {
            width: 100%;
            background: var(--deep-blue);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--bluish-gray);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            background: var(--white);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* Animations concepts */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .water-drop {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <header>
        <div class="location-info">
            <h1>Colonia Kennedy</h1>
            <p>Sector Zona 5</p>
        </div>
        <div class="period-badge">1-15 Mar</div>
    </header>

    <main>
        <div class="main-card">
            <div class="status-pill">Hoy sí hay agua</div>
            <div class="water-drop">💧</div>
            <div class="schedule">06:00 AM</div>
            <p style="opacity: 0.8; font-size: 0.9rem;">Hasta las 08:00 PM</p>
            <div class="warning-tag">El horario puede variar según tu ubicación</div>
        </div>

        <div class="next-block" style="margin-top: 20px;">
            <div class="next-info">
                <h3>Próximo Abastecimiento</h3>
                <p>Miércoles 12 de Marzo</p>
            </div>
            <div class="next-countdown">faltan 2 días</div>
        </div>

        <button class="btn-calendar" style="margin-top: 20px;">Ver calendario completo</button>

        <div class="quick-actions" style="margin-top: 30px;">
            <div class="action-item">
                <div class="action-icon">📤</div>
                <span>Compartir</span>
            </div>
            <div class="action-item">
                <div class="action-icon">⭐</div>
                <span>Favorito</span>
            </div>
            <div class="action-item">
                <div class="action-icon">📅</div>
                <span>Calendario</span>
            </div>
            <div class="action-item">
                <div class="action-icon">📍</div>
                <span>Colonia</span>
            </div>
        </div>
    </main>
</body>
</html>
