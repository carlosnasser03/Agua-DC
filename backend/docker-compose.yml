version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aguadc-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aguadc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aguadc-api
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/aguadc?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
